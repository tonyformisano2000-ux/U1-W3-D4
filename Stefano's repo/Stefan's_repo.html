<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EPICalendar</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="container">
      <main>
        <h1>
          <!-- NOME DEL MESE -->
        </h1>
        <section id="calendar">
          <!-- qui dentro ci andranno a finire le caselle del caledario -->
        </section>
        <h2>Add event</h2>
        <article id="addMeeting">
          <span id="newMeetingDay">
            <!-- qui ci andrà a finire il numero del giorno cliccato -->
            <!-- titolo provvisorio: -->
            Click on a day!
          </span>
          <form id="meeting-form">
            <div>
              <h4>Event Time</h4>
              <input type="time" id="newMeetingTime" required />
            </div>
            <div>
              <h4>Event Name</h4>
              <input
                type="text"
                id="newMeetingName"
                required
                placeholder="Insert a name for the event"
              />
            </div>
            <div>
              <h4>Save</h4>
              <button>Save Event</button>
            </div>
          </form>
        </article>
      </main>
      <footer>
        <!-- questa sezione è NASCOSTA di default! -->
        <div id="appointments">
          <h2>Events for the day:</h2>
          <ul id="appointmentsList"></ul>
          <h2>Appointments of the day:</h2>
          <ul id="appointmentsList">
            <!-- qui ci devono finire TUTTI gli appuntamenti per la giornata selezionata -->
          </ul>
        </div>
      </footer>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
